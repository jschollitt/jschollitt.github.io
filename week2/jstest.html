<body>
<div style="background-color: aqua; width:300px;">
Button example:<br/>
	<button type="button" onclick="myAction()">Enter</button>
	<p id="myDisplay"></p><br/>

<script>
	function myAction() {
		document.getElementById("myDisplay").innerHTML= 'Hello' ;	
	}
</script>

</div><br/><br/>

</div><br/><br/>
<div style="background-color: lightblue; width:300px;">
Input example:<br/>
Name: <input id="username" type="text"> <br/>
Age: <input id="age" type="number"><br/>
<button type="button" onclick="myAction2()">Enter</button>
<p id="myDisplay2"></p><br/>
<script>
function myAction2() {
var mytext;
var myage;
    // Get the value of the input field with id="username"
   mytext = document.getElementById("username").value;
// Get the value of the input field with id="age"
   myage = document.getElementById("age").value;

    document.getElementById("myDisplay2").innerHTML= 'Hello '  + mytext + ' Your age is '  + myage;
} 
</script>
<br/><br/>
	</div><br/><br/>
	<div id="d1" style="background-color: lightgreen; width: 300px;">	<br/><br/>
	<input type="radio" name="myColor"  checked id="myRed" onclick="myAction3()"> Red<br>
	<input type="radio" name="myColor"  id="myBlue" onclick="myAction3()"> Blue<br>
	<script>
	function myAction3() {
		if (document.getElementById("myRed").checked){
			document.getElementById("d1").style.backgroundColor = "red";
	//alert(' It is a red colour.');
	} else {
		document.getElementById("d1").style.backgroundColor  = "blue";
		//alert(' It is a blue colour.');
	}
	}
	</script>
</div>
