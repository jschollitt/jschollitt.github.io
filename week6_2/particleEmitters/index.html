<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./assets/js/gameObject.js"></script>
    <script src="./assets/js/gameEngine.js"></script>
</head>

<body>
  <section>
    <div class="center">
      <div>
        <subtitle>Create Object on Click</subtitle>
      </div>
      <canvas id="canvas1" width="2500" height="1000"></canvas>
      <div style="width: 40%; max-width: 400px;">
        <form>
          <div>
            <label for="numParticles">Number of Particles:</label>
            <input id="inputNumParticles"
                   type="range" 
                   id="numParticles" 
                   name="numParticles" 
                   value="100"
                   min="1"
                   max="1000">
            <span id="numParticlesValue">100</span>
          </div>
          <div>
            <label for="emitRate">Emit Rate (particles/sec):</label>
            <input id="inputEmitRate"
                   type="range" 
                   id="emitRate" 
                   name="emitRate" 
                   value="100"
                   min="1"
                   max="1000">
            <span id="emitRateValue">100</span> 
          </div>
          <div>
            <label for="particleRadius">Particle Radius:</label>
            <input id="inputParticleRadius"
                   type="range" 
                   id="particleRadius" 
                   name="particleRadius" 
                   value="5"
                   min="1"
                   max="50">
            <span id="particleRadiusValue">5</span>
          </div>
          <div>
            <label for="particleSpeed">Particle Speed:</label>
            <input id="inputParticleSpeed"
                   type="range" 
                   id="particleSpeed" 
                   name="particleSpeed" 
                   value="50"
                   min="1"
                   max="1000">
            <span id="particleSpeedValue">5</span>
          </div>
          <div>
            <label for="particleLifeTime">Particle Life Time:</label>
            <input id="inputParticleLifeTime"
                   type="range" 
                   id="particleLifeTime" 
                   name="particleLifeTime" 
                   value="2"
                   min="0.1"
                   max="5">
            <span id="particleLifeTimeValue">0.5</span>
          </div>
          <div>
            <label for="inputColorStart">Start Color:</label>
            <input type="color" 
                   id="inputColorStart" 
                   name="startColor" 
                   value="#0000ff">
          </div>
          <div>
            <label for="inputColorEnd">End Color:</label>
            <input type="color" 
                   id="inputColorEnd" 
                   name="endColor" 
                   value="#ff0000">
          </div>
        </form>
      </div>
    </div>
  </section>
</body>

</html>
