<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="css/canvas1.css">
    <title>canvas example 4</title>
    <style>

    </style>
</head>

<body>
    <div id="outer">
        <form>
            <label class="container">Vertical
                <input type="radio" checked="checked" name="radio" oninput="SetGradientDir(1)">
                <span class="checkmark"></span>
            </label>
            <label class="container">Horizontal
                <input type="radio" name="radio" oninput="SetGradientDir(2)">
                <span class="checkmark"></span>
            </label>
            <label class="container">Diagonal A
                <input type="radio" name="radio" oninput="SetGradientDir(3)">
                <span class="checkmark"></span>
            </label>
            <label class="container">Diagonal B
                <input type="radio" name="radio" oninput="SetGradientDir(4)">
                <span class="checkmark"></span>
            </label>
        </form>
        <div class="slidecontainer">
            <input type="range" min="1" max="100" value="50" class="slider" id="myRange" oninput="SliderUpdate(this)">
            <input type="text" id="textfield" value="hello">
            <button onclick="btn()">submit</button>
        </div>
        <canvas id="canvas1" width="600" height="600">
            Your browser doesn't support the canvas! Try another browser.
        </canvas>
    </div>


</body>
<script>
    var mycanvas = document.getElementById("canvas1");
    var cntx = mycanvas.getContext('2d');

    var canvasWidth = mycanvas.clientWidth;
    var canvasHeight = mycanvas.clientHeight;

    let mygradient = null;

    let gradientDirection = 1;

    DrawGradients(0.5);

    function DrawGradients(value) {
        RecalcGradient(value)
        cntx.clearRect(0, 0, canvasWidth, canvasHeight);
        cntx.fillStyle = mygradient;
        cntx.fillRect(0, 0, canvasWidth, canvasHeight);
    }

    function RecalcGradient(value) {

        switch (gradientDirection) {
            case 2:
                mygradient = cntx.createLinearGradient(0, 0, canvasWidth, 0);
                break;
            case 3:
                mygradient = cntx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
                break;
            case 4:
                mygradient = cntx.createLinearGradient(0, canvasHeight, canvasWidth, 0);
                break;
            default:
                mygradient = cntx.createLinearGradient(0, 0, 0, canvasWidth);
                break;
        }

        mygradient.addColorStop(0, "#ffffff");
        mygradient.addColorStop(value, "#111111");
        mygradient.addColorStop(1, "#000000");
    }

    function SliderUpdate(slider) {
        DrawGradients((isNaN(slider.value) ? 50 : slider.value) / 100);
    }

    function SetGradientDir(option) {
        gradientDirection = option;
        SliderUpdate(document.getElementById("myRange"));
    }

</script>

</html>
