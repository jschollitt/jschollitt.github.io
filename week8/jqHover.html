<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-width: 2px;
            border-color: black;
        }
        td {
            width: 300px;
            height: 150px;
        }
        #overlay {
            z-index: 1;
            display: block;
            position: absolute;
            width: 100px;
            height: 100px;
            border-width: 3px;
            border-color: black;
            background-color: gray;
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        $(document).ready(function () {
            $("#overlay").hide();
            $(".hover").hover(function() {
                $("#overlay").css($(this).offset());
                $("#overlay").html($(this).css("background-color").toString()).show();
            }, function() {
                $("#overlay").hide();
            });
        });

        
    </script>
</head>
<body>
    <div id="overlay">div</div>
    <table>
        <tr>
            <td class="hover" style="background-color: red;">1</td>
            <td class="hover" style="background-color: orange;">2</td>
            <td class="hover" style="background-color: yellow;">3</td>
        </tr>
        <tr>
            <td class="hover" style="background-color: green;">4</td>
            <td class="hover" style="background-color: blue;">5</td>
            <td class="hover" style="background-color: purple;">6</td>
        </tr>
    </table>
</body>

</html>
