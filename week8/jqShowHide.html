<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        function hideShowChaining() {
            $("#panel").hide(500).show(500);
        }

        function hidePanel() {
            $("#panel").hide(500, showPanel);
        }

        function showPanel() {
            $("#panel").show(500, hidePanel);
        }

        $(document).ready(function () {
            $("#toggle").click(hidePanel);
            $("#toggle2").click(hideShowChaining);
        });
    </script>
</head>
<body>
    <button id="toggle">Toggle the panel visibility</button>
    <button id="toggle2">Toggle the panel visibility</button>
    <div id="panel" style="width: 500px;height: 500px;border-width: 3px;border-color: black;">
        <img src="images/gameChar.png" style="width: 350px;height: 500px;">
    </div>
</body>

</html>
